<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>광산 쿨타임 관리</title>
<style>
@font-face {
  font-family: 'DungGeunMo';
  src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/DungGeunMo.woff') format('woff');
  font-display: swap;
}
:root {
  --bg: #17191d;
  --panel: #23262c;
  --panel-2: #1c1f24;
  --border: #3a3e46;
  --text: #e8e6df;
  --muted: #9aa0ab;
  --redstone: #ff5544;
  --emerald: #3ddc84;
  --gold: #ffc94d;
  --diamond: #58c4dd;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}
.pixel { font-family: 'DungGeunMo', monospace; letter-spacing: 0.5px; }

header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 20px;
  border-bottom: 2px solid var(--border);
  background: var(--panel-2);
}
header h1 { font-size: 20px; color: var(--gold); font-family: 'DungGeunMo', monospace; font-weight: normal; }
header .sub { color: var(--muted); font-size: 12px; }
header .spacer { flex: 1; }

.btn {
  background: var(--panel);
  border: 2px solid var(--border);
  color: var(--text);
  padding: 7px 14px;
  cursor: pointer;
  font-family: 'DungGeunMo', monospace;
  font-size: 13px;
  box-shadow: inset 0 -3px 0 rgba(0,0,0,.35);
  transition: transform .05s ease, border-color .15s;
}
.btn:hover { border-color: var(--gold); }
.btn:active { transform: translateY(2px); box-shadow: none; }
.btn:focus-visible { outline: 2px solid var(--diamond); outline-offset: 2px; }
.btn.primary { background: #2d4a2f; border-color: var(--emerald); color: #d7ffe6; }
.btn.small { padding: 4px 9px; font-size: 12px; }
.btn.danger:hover { border-color: var(--redstone); color: var(--redstone); }

main {
  display: grid;
  grid-template-columns: 1fr 400px;
  gap: 16px;
  padding: 16px 20px;
  max-width: 1500px;
  margin: 0 auto;
}
@media (max-width: 980px) { main { grid-template-columns: 1fr; } }

.map-panel, .side-panel {
  background: var(--panel);
  border: 2px solid var(--border);
}
.panel-title {
  font-family: 'DungGeunMo', monospace;
  font-size: 14px;
  color: var(--diamond);
  padding: 10px 14px;
  border-bottom: 2px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.panel-title .hint { margin-left: auto; color: var(--muted); font-size: 11px; font-family: inherit; }

#mapWrap { padding: 10px; }
#mapSvg { width: 100%; height: auto; display: block; background:
  linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
  linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
  background-size: 40px 40px;
  background-color: #14161a;
  border: 2px solid var(--border);
}

.legend { display: flex; gap: 16px; padding: 8px 14px 12px; color: var(--muted); font-size: 12px; flex-wrap: wrap; }
.legend span { display: inline-flex; align-items: center; gap: 6px; }
.dot { width: 10px; height: 10px; display: inline-block; }
.dot.mine { background: var(--redstone); }
.dot.portal { background: var(--emerald); border-radius: 50%; }
.dot.route { width: 18px; height: 3px; background: var(--gold); }

.side-panel { display: flex; flex-direction: column; max-height: calc(100vh - 110px); }
@media (max-width: 980px) { .side-panel { max-height: none; } }

.mine-list { overflow-y: auto; flex: 1; }
.mine-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--panel-2);
}
.mine-row .name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mine-row .time {
  font-family: 'DungGeunMo', monospace;
  font-size: 14px;
  min-width: 70px;
  text-align: right;
  color: var(--gold);
}
.mine-row .time.ready { color: var(--emerald); }
.mine-row input {
  width: 76px;
  background: var(--panel-2);
  border: 2px solid var(--border);
  color: var(--text);
  padding: 5px 7px;
  font-size: 13px;
}
.mine-row input:focus { outline: none; border-color: var(--diamond); }
.mine-row .del {
  background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; padding: 2px 4px;
}
.mine-row .del:hover { color: var(--redstone); }

.side-actions { padding: 10px 12px; border-top: 2px solid var(--border); display: flex; flex-wrap: wrap; gap: 8px; }
.route-summary { padding: 10px 14px; border-top: 2px solid var(--border); font-size: 13px; max-height: 180px; overflow-y: auto; }
.route-summary ol { padding-left: 20px; display: grid; gap: 4px; }
.route-summary .empty { color: var(--muted); }
.route-summary b { color: var(--gold); font-weight: normal; font-family: 'DungGeunMo', monospace; }

dialog {
  background: var(--panel);
  color: var(--text);
  border: 2px solid var(--gold);
  padding: 20px;
  min-width: 300px;
}
dialog::backdrop { background: rgba(0,0,0,.6); }
dialog h2 { font-family: 'DungGeunMo', monospace; font-size: 15px; color: var(--gold); margin-bottom: 12px; font-weight: normal; }
dialog label { display: block; color: var(--muted); font-size: 12px; margin: 10px 0 4px; }
dialog input, dialog textarea {
  width: 100%;
  background: var(--panel-2);
  border: 2px solid var(--border);
  color: var(--text);
  padding: 7px 9px;
  font-size: 14px;
  font-family: inherit;
}
dialog input:focus, dialog textarea:focus { outline: none; border-color: var(--diamond); }
dialog .row { display: flex; gap: 8px; }
dialog .row > div { flex: 1; }
dialog .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
dialog .error { color: var(--redstone); font-size: 12px; margin-top: 6px; min-height: 15px; }
textarea { resize: vertical; min-height: 110px; font-family: monospace !important; }

.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--panel); border: 2px solid var(--emerald);
  padding: 9px 18px; font-family: 'DungGeunMo', monospace; font-size: 13px;
  opacity: 0; pointer-events: none; transition: opacity .25s;
  z-index: 50;
}
.toast.show { opacity: 1; }

.drop-zone {
  border: 2px dashed var(--border);
  padding: 24px 14px;
  text-align: center;
  color: var(--muted);
  cursor: pointer;
  margin-top: 6px;
  transition: border-color .15s;
}
.drop-zone:hover, .drop-zone.over { border-color: var(--gold); color: var(--text); }
.drop-zone img { max-width: 100%; max-height: 220px; display: block; margin: 0 auto; }
.scan-status { font-size: 13px; margin-top: 10px; min-height: 18px; }
.engine-row { display: grid; gap: 4px; margin-top: 8px; font-size: 13px; color: var(--text); }
.engine-row label { display: flex; align-items: center; gap: 6px; margin: 0; color: var(--text); font-size: 13px; cursor: pointer; }
.engine-row input { accent-color: var(--gold); }
.drop-zone video { display: block; width: 100%; max-height: 220px; object-fit: contain; background: #000; }
.scan-result input.cell {
  width: 100%; min-width: 52px;
  background: var(--panel-2); border: 1px solid var(--border);
  color: var(--text); padding: 3px 5px; font-size: 13px;
}
.scan-result input.cell:focus { outline: none; border-color: var(--diamond); }
.scan-status.working { color: var(--diamond); }
.scan-status.error { color: var(--redstone); }
.scan-result { margin-top: 10px; max-height: 220px; overflow-y: auto; border: 2px solid var(--border); display: none; }
.scan-result table { width: 100%; border-collapse: collapse; font-size: 13px; }
.scan-result th, .scan-result td { padding: 5px 8px; text-align: left; border-bottom: 1px solid var(--panel-2); }
.scan-result th { color: var(--muted); font-weight: normal; font-size: 12px; position: sticky; top: 0; background: var(--panel); }
.scan-result .new-tag { color: var(--emerald); font-size: 11px; }
.scan-result .upd-tag { color: var(--gold); font-size: 11px; }

svg text { user-select: none; }
.mine-marker { cursor: pointer; }
.mine-marker:hover .mine-block { stroke: var(--gold); stroke-width: 2; }
@media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>

<header>
  <h1>⛏ 광산 쿨타임 관리</h1>
  <span class="sub">쿨타임 기반 최적 채굴 경로 · 이동 속도 15블록/초</span>
  <span class="spacer"></span>
  <button class="btn small primary" id="btnScan">📷 화면 스캔</button>
  <button class="btn small" id="btnImport">CSV 불러오기</button>
  <button class="btn small" id="btnExport">CSV 내보내기</button>
  <button class="btn small danger" id="btnReset">초기화</button>
</header>

<main>
  <section class="map-panel">
    <div class="panel-title">지도 <span class="hint">광산을 클릭하면 쿨타임을 수정할 수 있어요</span></div>
    <div id="mapWrap"><svg id="mapSvg" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="광산과 포탈 지도"></svg></div>
    <div class="legend">
      <span><i class="dot mine"></i> 광산</span>
      <span><i class="dot portal"></i> 포탈</span>
      <span><i class="dot route"></i> 지정된 포탈 경로</span>
    </div>
  </section>

  <aside class="side-panel">
    <div class="panel-title">광산 쿨타임 <span class="hint">입력: 5 30 / 5:30 / 5분 30초 / 5 · 휠로 ±1분</span></div>
    <div class="mine-list" id="mineList"></div>
    <div class="route-summary" id="routeSummary"><span class="empty">쿨타임을 입력하면 출발 포탈이 계산됩니다.</span></div>
    
    <div class="side-actions">
      <select id="routeMode" class="btn" style="flex: 1 1 100%; margin-bottom: 8px; padding: 6px; text-align: left;">
        <option value="simple" selected>방식 2: 남은 시간 적은 순서 (가까운 출발 포탈 안내)</option>
        <option value="optimal">방식 1: 대기시간 최소화 (연속 콤보 동선 최적화)</option>
      </select>
      <button class="btn primary" id="btnRoute" style="flex:1">경로 갱신</button>
      <button class="btn" id="btnAddMine">+ 광산</button>
      <button class="btn" id="btnAddPortal">+ 포탈</button>
    </div>
  </aside>
</main>

<dialog id="cdDialog">
  <h2 id="cdTitle">쿨타임 수정</h2>
  <label for="cdInput">쿨타임 (예: 5 30, 5:30, 5분 30초, 5)</label>
  <input id="cdInput" autocomplete="off">
  <div class="error" id="cdError"></div>
  <div class="actions">
    <button class="btn small" id="cdCancel" type="button">취소</button>
    <button class="btn small primary" id="cdOk" type="button">설정</button>
  </div>
</dialog>

<dialog id="addDialog">
  <h2 id="addTitle">광산 추가</h2>
  <label for="addName">이름</label>
  <input id="addName" autocomplete="off">
  <div class="row">
    <div><label for="addX">X 좌표</label><input id="addX" type="number"></div>
    <div><label for="addZ">Z 좌표</label><input id="addZ" type="number"></div>
  </div>
  <div class="error" id="addError"></div>
  <div class="actions">
    <button class="btn small" id="addCancel" type="button">취소</button>
    <button class="btn small primary" id="addOk" type="button">추가</button>
  </div>
</dialog>

<dialog id="csvDialog">
  <h2>CSV 불러오기</h2>
  <label>형식: <code>type,name,x,z</code> (type은 mine 또는 portal)<br>헤더 없이 <code>name,x,z</code>만 있으면 광산으로 처리됩니다.</label>
  <textarea id="csvText" placeholder="mine,다이아 광산,120,-340&#10;portal,중앙 포탈,0,0"></textarea>
  <label style="margin-top:10px">또는 파일 선택 <input type="file" id="csvFile" accept=".csv,.txt" style="border:none;padding:4px 0"></label>
  <div class="error" id="csvError"></div>
  <div class="actions">
    <button class="btn small" id="csvCancel" type="button">취소</button>
    <button class="btn small" id="csvReplace" type="button">교체</button>
    <button class="btn small primary" id="csvAppend" type="button">추가</button>
  </div>
</dialog>

<dialog id="scanDialog" style="min-width:440px;max-width:560px">
  <h2>📷 방송 화면 스캔</h2>
  <label>채금장 목록이 보이는 화면을 캡처하거나 스크린샷을 올리면 이름·좌표·쿨타임을 읽어 자동 등록합니다.</label>
  <div class="engine-row">
    <label><input type="radio" name="scanEngine" value="ocr"> 로컬 OCR — 무료, 화면이 브라우저 밖으로 안 나감</label>
    <label><input type="radio" name="scanEngine" value="gemini"> Gemini AI (추천, 매우 정확함)</label>
    <label><input type="radio" name="scanEngine" value="ai"> Claude AI</label>
  </div>
  <div class="row" style="margin:8px 0">
    <button class="btn small" id="btnCapture" type="button" style="flex:0 0 auto">🖥 화면·창 캡처</button>
    <button class="btn small" id="btnSnap" type="button" style="flex:0 0 auto;display:none">📸 이 장면 스캔</button>
  </div>
  <div class="drop-zone" id="dropZone" tabindex="0">
    클릭해서 이미지 선택 · 드래그 앤 드롭 · Ctrl+V 붙여넣기
  </div>
  <input type="file" id="scanFile" accept="image/*" style="display:none">
  <div id="apiKeyBox" style="display:none;margin-top:10px">
    <label for="apiKeyInput">API 키 (Gemini 또는 Anthropic · 이 브라우저에만 저장됨)</label>
    <div class="row">
      <input id="apiKeyInput" type="password" placeholder="AI API 키 입력..." autocomplete="off">
      <button class="btn small" id="apiKeySave" type="button" style="flex:0 0 auto">키 저장</button>
    </div>
  </div>
  <div class="scan-status" id="scanStatus"></div>
  <div class="scan-result" id="scanResult"></div>
  <div class="actions">
    <button class="btn small" id="scanCancel" type="button">닫기</button>
    <button class="btn small" id="scanRun" type="button" disabled>스캔 시작</button>
    <button class="btn small primary" id="scanApply" type="button" style="display:none">적용</button>
  </div>
</dialog>

<div class="toast" id="toast"></div>

<script>
'use strict';
const SPEED = 15; // 블록/초
const STORE_KEY = 'minemap:data';

// ---------- 상태 ----------
let mines = [];   
let portals = []; 
let route = [];   
let nextId = 1;

const now = () => Date.now();
const remainSec = m => Math.max(0, Math.ceil((m.expiry - now()) / 1000));
const dist = (a, b) => Math.hypot(a.x - b.x, a.z - b.z);

function fmt(sec) {
  sec = Math.max(0, Math.round(sec));
  return `${Math.floor(sec / 60)}분 ${sec % 60}초`;
}
function fmtClock(sec) {
  sec = Math.max(0, Math.round(sec));
  return `${Math.floor(sec / 60)}:${String(sec % 60).padStart(2, '0')}`;
}

// "5 30" / "5:30" / "5분 30초" / "30초" / "5"(분) → 초
function parseCooldown(str) {
  str = (str || '').trim();
  if (!str) throw new Error('빈 입력');
  let m;
  if ((m = str.match(/^(\d+)\s+(\d+)$/))) return +m[1] * 60 + +m[2];
  if ((m = str.match(/^(\d+):(\d+)$/))) return +m[1] * 60 + +m[2];
  if (/^\d+$/.test(str)) return +str * 60;
  let mins = 0, secs = 0, matched = false;
  if ((m = str.match(/(\d+)\s*분/))) { mins = +m[1]; matched = true; }
  if ((m = str.match(/(\d+)\s*초/))) { secs = +m[1]; matched = true; }
  if (!matched) throw new Error("유효한 형식이 아닙니다. 예: '5 30', '5:30', '5분 30초', '5'");
  return mins * 60 + secs;
}

// ---------- 저장 ----------
const INSIDE_CLAUDE = typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function';

async function storageSet(key, value) {
  if (INSIDE_CLAUDE) { await window.storage.set(key, value); }
  else { localStorage.setItem(key, value); }
}
async function storageGet(key) {
  if (INSIDE_CLAUDE) {
    const r = await window.storage.get(key);
    return r ? r.value : null;
  }
  return localStorage.getItem(key);
}

async function save() {
  try {
    await storageSet(STORE_KEY, JSON.stringify({ mines, portals, nextId }));
  } catch (e) { }
}
async function load() {
  try {
    const v = await storageGet(STORE_KEY);
    if (v) {
      const d = JSON.parse(v);
      mines = d.mines || [];
      portals = d.portals || [];
      nextId = d.nextId || 1;
      return true;
    }
  } catch (e) { }
  return false;
}

// ---------- API 키 ----------
const APIKEY_KEY = 'minemap:apikey';
let apiKey = '';
async function loadApiKey() {
  try { apiKey = (await storageGet(APIKEY_KEY)) || ''; } catch (e) { apiKey = ''; }
}
async function saveApiKey(k) {
  apiKey = (k || '').trim();
  try { await storageSet(APIKEY_KEY, apiKey); } catch (e) {}
}
function loadSample() {
  const P = (name, x, z) => ({ id: nextId++, name, x, z });
  
  // CSV 데이터 기반 기본 포탈(전초) 세팅
  portals = [
    P('중앙 포탈', -962, -814),
    P('1번 전초', -1906, -3710),
    P('2번 전초', -4330, 1535),
    P('3번 전초', 1689, -2431)
  ];
  
  // CSV 데이터 기반 기본 채굴장 세팅
  mines = [
    { ...P('1번 채굴장', -1094, -701), expiry: 0 },
    { ...P('2번 채굴장', -1038, -15), expiry: 0 },
    { ...P('3번 채굴장', -1837, -943), expiry: 0 },
    { ...P('4번 채굴장', -1732, -340), expiry: 0 },
    { ...P('5번 채굴장', -1121, 376), expiry: 0 },
    { ...P('12번 채굴장', -2164, -3085), expiry: 0 },
    { ...P('13번 채굴장', -2035, -3664), expiry: 0 },
    { ...P('21번 채굴장', -3960, 1241), expiry: 0 },
    { ...P('23번 채굴장', -1859, 1193), expiry: 0 },
    { ...P('25번 채굴장', -3382, 1681), expiry: 0 },
    { ...P('26번 채굴장', -3488, 2353), expiry: 0 },
    { ...P('27번 채굴장', -3941, 1948), expiry: 0 },
    { ...P('28번 채굴장', -4421, 1001), expiry: 0 },
    { ...P('29번 채굴장', -3849, 466), expiry: 0 },
    { ...P('30번 채굴장', -2535, -679), expiry: 0 },
    { ...P('37번 채굴장', -2406, -3560), expiry: 0 }
  ];
}

// ---------- 👑 핵심 알고리즘 스위칭 로직 ----------
function findOptimalRoute() {
  const modeEl = document.getElementById('routeMode');
  const mode = modeEl ? modeEl.value : 'simple';
  const result = [];
  const cdMap = new Map(mines.map(m => [m.id, remainSec(m)]));

  if (mode === 'simple') {
    // [방식 2] 남은 쿨타임(시간) 기준으로 '무조건 오름차순' 정렬
    // 쿨타임이 같다면 이름순 정렬
    const sortedMines = [...mines].sort((a, b) => {
      const cdA = cdMap.get(a.id);
      const cdB = cdMap.get(b.id);
      if (cdA !== cdB) return cdA - cdB;
      return a.name.localeCompare(b.name);
    });
    
    let order = 1;
    for (const mine of sortedMines) {
      let closest = null, minT = Infinity;
      // 해당 광산과 가장 가까운 포탈만 탐색
      for (const p of portals) {
        const t = dist(p, mine) / SPEED;
        if (t < minT) { minT = t; closest = p; }
      }
      if (closest) {
        result.push({ portalId: closest.id, mineId: mine.id, order: order++, travel: minT });
      }
    }
    return result;
  }

  // [방식 1] 도착 후 대기시간을 최소화하는 연속 콤보 동선 최적화 (기존)
  let currentTime = 0;
  const visited = new Set();
  
  while (visited.size < mines.length) {
    const candidates = [];
    for (const mine of mines) {
      if (visited.has(mine.id)) continue;
      
      let closest = null, minT = Infinity;
      for (const p of portals) {
        const t = dist(p, mine) / SPEED;
        if (t < minT) { minT = t; closest = p; }
      }
      
      if (closest) {
        const cd = cdMap.get(mine.id);
        const arrival = currentTime + minT;
        const waitTime = Math.max(0, cd - arrival);
        candidates.push({ mine, portal: closest, travel: minT, waitTime });
      }
    }
    if (!candidates.length) break;

    // 대기 시간이 짧은 순으로 우선순위, 대기 시간이 같다면 이동 거리가 짧은 순
    candidates.sort((a, b) => {
      if (a.waitTime !== b.waitTime) return a.waitTime - b.waitTime;
      return a.travel - b.travel;
    });

    const best = candidates[0];
    visited.add(best.mine.id);
    result.push({ portalId: best.portal.id, mineId: best.mine.id, order: result.length + 1, travel: best.travel });
    
    currentTime += best.travel + best.waitTime;
  }
  return result;
}

function runRoute() { 
  route = findOptimalRoute(); 
  render(); 
}

// ---------- 좌표 변환 ----------
function mapCoords() {
  const all = [...mines, ...portals];
  if (!all.length) return () => [400, 400];
  const xs = all.map(l => l.x), zs = all.map(l => l.z);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minZ = Math.min(...zs), maxZ = Math.max(...zs);
  const sx = 700 / Math.max(1, maxX - minX);
  const sz = 700 / Math.max(1, maxZ - minZ);
  return loc => [(loc.x - minX) * sx + 50, (loc.z - minZ) * sz + 50];
}

// ---------- 렌더링 ----------
const svg = document.getElementById('mapSvg');
const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  if (text != null) e.textContent = text;
  return e;
}

function drawMap() {
  svg.innerHTML = '';
  const toXY = mapCoords();
  const byId = new Map([...mines, ...portals].map(l => [l.id, l]));

  // 경로 선
  for (const step of route) {
    const p = byId.get(step.portalId), m = byId.get(step.mineId);
    if (!p || !m) continue;
    const [x1, y1] = toXY(p), [x2, y2] = toXY(m);
    svg.appendChild(el('line', { x1, y1, x2, y2, stroke: '#ffc94d', 'stroke-width': 2.5, 'stroke-dasharray': '7 5' }));
    const remain = remainSec(m);
    const label = remain > 0 ? `쿨 ${fmtClock(remain)} · 이동 ${fmtClock(step.travel)}` : `이동 ${fmtClock(step.travel)}`;
    const tx = (x1 + x2) / 2, ty = (y1 + y2) / 2 - 8;
    const t = el('text', { x: tx, y: ty, fill: '#ffc94d', 'font-size': 12, 'text-anchor': 'middle', 'paint-order': 'stroke', stroke: '#14161a', 'stroke-width': 4 }, label);
    svg.appendChild(t);
  }

  // 포탈
  for (const p of portals) {
    const [x, y] = toXY(p);
    svg.appendChild(el('circle', { cx: x, cy: y, r: 9, fill: '#3ddc84' }));
    svg.appendChild(el('circle', { cx: x, cy: y, r: 4, fill: '#14161a' }));
    svg.appendChild(el('text', { x: x + 13, y: y + 4, fill: '#b9c0cc', 'font-size': 12 }, p.name));
  }

  // 광산
  const orderByMine = new Map(route.map(s => [s.mineId, s.order]));
  for (const m of mines) {
    const [x, y] = toXY(m);
    const remain = remainSec(m);
    const g = el('g', { class: 'mine-marker' });
    g.appendChild(el('rect', { x: x - 8, y: y - 8, width: 16, height: 16, fill: remain > 0 ? '#ff5544' : '#3ddc84', class: 'mine-block' }));
    g.appendChild(el('rect', { x: x - 4, y: y - 4, width: 8, height: 8, fill: '#14161a', opacity: 0.55 }));
    g.addEventListener('click', () => openCooldownDialog(m.id));
    svg.appendChild(g);

    const label = `${m.name} (${remain > 0 ? fmtClock(remain) : '준비됨'})`;
    svg.appendChild(el('text', { x: x + 13, y: y - 8, fill: '#e8e6df', 'font-size': 12, 'paint-order': 'stroke', stroke: '#14161a', 'stroke-width': 4 }, label));

    // 방문 순서 배지
    const order = orderByMine.get(m.id);
    if (order) {
      svg.appendChild(el('circle', { cx: x, cy: y - 20, r: 11, fill: '#000', stroke: '#ffc94d', 'stroke-width': 2 }));
      svg.appendChild(el('text', { x, y: y - 15.5, fill: '#fff', 'font-size': 13, 'font-weight': 'bold', 'text-anchor': 'middle' }, order));
    }
  }
}

function parseCsv(text) {
  const newMines = [], newPortals = [];
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  for (const line of lines) {
    const cells = line.split(',').map(c => c.trim());
    const low = cells.map(c => c.toLowerCase());
    if (low.includes('name') && (low.includes('x') || low.includes('z'))) continue; // 헤더 스킵
    let type = 'mine', name, x, z;
    if (cells.length >= 4 && (low[0] === 'mine' || low[0] === 'portal')) {
      [type, name] = [low[0], cells[1]]; x = parseInt(cells[2], 10); z = parseInt(cells[3], 10);
    } else if (cells.length >= 3) {
      name = cells[0]; x = parseInt(cells[1], 10); z = parseInt(cells[2], 10);
    } else continue;
    if (!name || isNaN(x) || isNaN(z)) continue;
    const loc = { id: nextId++, name, x, z };
    if (type === 'portal') newPortals.push(loc);
    else newMines.push({ ...loc, expiry: 0 });
  }
  return { newMines, newPortals };
}
function importCsv(replace) {
  const { newMines, newPortals } = parseCsv(document.getElementById('csvText').value);
  if (!newMines.length && !newPortals.length) {
    document.getElementById('csvError').textContent = '읽을 수 있는 데이터가 없습니다.';
    return;
  }
  if (replace) { mines = newMines; portals = newPortals; route = []; }
  else { mines.push(...newMines); portals.push(...newPortals); }
  save(); render();
  csvDialog.close();
  toast(`광산 ${newMines.length}개, 포탈 ${newPortals.length}개 불러옴`);
}

// ---------- 로컬 OCR ----------
let ocrWorker = null;
function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = res;
    s.onerror = () => rej(new Error('스크립트를 불러오지 못했습니다.'));
    document.head.appendChild(s);
  });
}
async function getOcrWorker(onProgress) {
  if (ocrWorker) return ocrWorker;
  if (!window.Tesseract) {
    onProgress('OCR 엔진 내려받는 중... (최초 1회)');
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.0/tesseract.min.js');
  }
  onProgress('한국어 인식 데이터 준비 중... (최초 1회)');
  ocrWorker = await Tesseract.createWorker('kor+eng', 1, {
    logger: m => {
      if (m.status === 'recognizing text') onProgress(`글자 인식 중... ${Math.round(m.progress * 100)}%`);
    }
  });
  return ocrWorker;
}

function preprocessForOcr(base64, invert) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.max(1, Math.min(3, 2600 / Math.max(img.width, img.height)));
      const c = document.createElement('canvas');
      c.width = Math.round(img.width * scale);
      c.height = Math.round(img.height * scale);
      const ctx = c.getContext('2d');
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, 0, 0, c.width, c.height);

      const d = ctx.getImageData(0, 0, c.width, c.height);
      const p = d.data;
      for (let i = 0; i < p.length; i += 4) {
        let g = 0.299 * p[i] + 0.587 * p[i + 1] + 0.114 * p[i + 2];
        if (invert) g = 255 - g;
        g = Math.max(0, Math.min(255, (g - 128) * 1.8 + 128));
        p[i] = p[i + 1] = p[i + 2] = g;
      }
      ctx.putImageData(d, 0, 0);
      resolve({ dataUrl: c.toDataURL('image/png'), width: c.width, height: c.height });
    };
    img.onerror = () => reject(new Error('이미지 전처리 실패'));
    img.src = 'data:image/png;base64,' + base64;
  });
}

function isDarkImage(base64) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = 60; c.height = 60;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0, 60, 60);
      const p = ctx.getImageData(0, 0, 60, 60).data;
      let sum = 0;
      for (let i = 0; i < p.length; i += 4) sum += 0.299 * p[i] + 0.587 * p[i + 1] + 0.114 * p[i + 2];
      resolve((sum / (p.length / 4)) < 128);
    };
    img.onerror = () => resolve(false);
    img.src = 'data:image/png;base64,' + base64;
  });
}

function parseOcrResult(data, W, H) {
  const items = [];
  const push = (text, bbox) => {
    text = (text || '').trim();
    if (text && bbox) {
      items.push({ text, cx: (bbox.x0 + bbox.x1) / 2, cy: (bbox.y0 + bbox.y1) / 2, x0: bbox.x0, x1: bbox.x1, y0: bbox.y0, y1: bbox.y1 });
    }
  };
  for (const l of (data.lines || [])) push(l.text, l.bbox);

  const words = [];
  for (const l of (data.lines || [])) {
    for (const w of (l.words || [])) {
      const t = (w.text || '').trim();
      if (t) words.push({ text: t, cx: (w.bbox.x0 + w.bbox.x1) / 2, cy: (w.bbox.y0 + w.bbox.y1) / 2, y0: w.bbox.y0, y1: w.bbox.y1 });
    }
  }

  const coordRe = /(-?\d{1,6})\s*[,，.\s]\s*(-?\d{1,4})\s*[,，.\s]\s*(-?\d{1,6})/;
  const timeRe = /(\d{1,3})\s*[:;：]\s*(\d{1,2})(?!\d)/;

  const anchors = [];
  for (const it of items) {
    const m = fixDigits(it.text).match(coordRe);
    if (m) anchors.push({ x: parseInt(m[1], 10), z: parseInt(m[3], 10), cx: it.cx, cy: it.cy });
  }

  if (!anchors.length && words.length) {
    const rows = [];
    const tol = H * 0.012;
    for (const w of words.slice().sort((a, b) => a.cy - b.cy)) {
      let row = rows.find(r => Math.abs(r.cy - w.cy) < tol);
      if (!row) { row = { cy: w.cy, ws: [] }; rows.push(row); }
      row.ws.push(w);
    }
    for (const r of rows) {
      r.ws.sort((a, b) => a.cx - b.cx);
      const joined = r.ws.map(w => w.text).join(' ');
      const m = fixDigits(joined).match(coordRe);
      if (m) {
        anchors.push({
          x: parseInt(m[1], 10), z: parseInt(m[3], 10),
          cx: r.ws.reduce((s, w) => s + w.cx, 0) / r.ws.length,
          cy: r.cy
        });
      }
      items.push({ text: joined, cx: r.ws[0].cx, cy: r.cy });
    }
  }

  const results = [];
  const maxDx = W * 0.22, maxDy = H * 0.22, belowDy = H * 0.06;

  for (const a of anchors) {
    if (results.some(r => r.x === a.x && r.z === a.z)) continue;
    const nearby = items
      .filter(o => Math.abs(o.cx - a.cx) < maxDx && o.cy < a.cy + belowDy && a.cy - o.cy < maxDy)
      .sort((p, q) => Math.abs(p.cy - a.cy) - Math.abs(q.cy - a.cy));

    let name = null, cooldown = null;
    for (const o of nearby) {
      const raw = o.text.replace(/\s+/g, ' ').trim();
      if (!name && /채[금굼금]장|광산|채굴/.test(raw)) {
        const nm = raw.match(/\S*\s*번?\s*(?:채[금굼금]장|광산)/);
        name = (nm ? nm[0] : raw).replace(/\s+/g, ' ').trim();
      }
      if (cooldown === null && !coordRe.test(fixDigits(raw))) {
        const tm = fixDigits(raw).match(timeRe);
        if (tm) {
          const mm = +tm[1], ss = +tm[2];
          if (ss < 60 && mm < 200) cooldown = mm * 60 + ss;
        }
      }
    }
    if (!name) {
      const ko = nearby.find(o => /[가-힣]{2,}/.test(o.text) && o.cy < a.cy);
      if (ko) name = ko.text.replace(/\s+/g, ' ').trim();
    }
    if (!name) name = `채금장 (${a.x}, ${a.z})`;
    results.push({ name, x: a.x, z: a.z, cooldown: cooldown || 0 });
  }
  return results;
}

async function runLocalOcr() {
  const setStatus = msg => { scanStatus.textContent = '⏳ ' + msg; scanStatus.className = 'scan-status working'; };
  const worker = await getOcrWorker(setStatus);
  const dark = await isDarkImage(scanImageData);
  const attempts = dark ? [true, false] : [false, true];

  let best = [], bestText = '';
  for (let i = 0; i < attempts.length; i++) {
    setStatus(`글자 인식 중... (${i + 1}/${attempts.length})`);
    const pre = await preprocessForOcr(scanImageData, attempts[i]);
    const { data } = await worker.recognize(pre.dataUrl);
    const parsed = parseOcrResult(data, pre.width, pre.height);
    if (!bestText) bestText = (data.text || '').trim();
    if (parsed.length > best.length) {
      best = parsed; bestText = (data.text || '').trim();
    }
    if (best.length) break;
  }

  lastOcrText = bestText;
  if (!best.length) throw new Error('화면에서 채금장을 찾지 못했습니다. 아래 인식된 글자를 확인해 주세요.');
  return best;
}

function loadScanImage(file) {
  const img = new Image();
  img.onload = () => {
    const maxSide = scanEngine === 'ocr' ? 4000 : 1568;
    const ratio = Math.min(1, maxSide / Math.max(img.width, img.height));
    const canvas = document.createElement('canvas');
    canvas.width = Math.round(img.width * ratio);
    canvas.height = Math.round(img.height * ratio);
    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
    const dataUrl = canvas.toDataURL('image/png');
    scanImageData = dataUrl.split(',')[1];
    dropZone.innerHTML = '';
    const preview = new Image();
    preview.src = dataUrl;
    dropZone.appendChild(preview);
    scanRunBtn.disabled = false;
    scanStatus.textContent = '이미지 준비 완료 — 스캔 시작을 누르세요.';
    scanStatus.className = 'scan-status';
    URL.revokeObjectURL(img.src);
  };
  img.onerror = () => {
    scanStatus.textContent = '이미지를 읽을 수 없습니다.';
    scanStatus.className = 'scan-status error';
  };
  img.src = URL.createObjectURL(file);
}

scanRunBtn.addEventListener('click', async () => {
  if (!scanImageData) return;
  scanRunBtn.disabled = true;
  scanResultBox.style.display = 'none';
  scanApplyBtn.style.display = 'none';

  if (scanEngine === 'ocr') {
    try {
      scanParsed = await runLocalOcr();
      showScanResult();
    } catch (e) {
      scanStatus.textContent = '⚠ OCR 실패: ' + e.message;
      scanStatus.className = 'scan-status error';
      if (lastOcrText) {
        scanResultBox.innerHTML =
          '<div style="padding:8px;font-size:12px;color:var(--muted)">OCR이 읽어낸 글자 (이게 비어있거나 깨졌다면 화면을 더 크게 캡처하세요):</div>' +
          '<pre style="padding:8px;margin:0;white-space:pre-wrap;font-size:12px;color:var(--text);max-height:150px;overflow:auto">' +
          lastOcrText.replace(/[<>&]/g, c => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;' }[c])) +
          '</pre>';
        scanResultBox.style.display = 'block';
      }
      scanRunBtn.disabled = false;
    }
    return;
  }

  const prompt = `이 게임 스크린샷에는 채금장(광산) 카드들이 격자로 나열되어 있다.
각 카드에는 다음이 표시된다:
- 상단: 남은 쿨타임 "분:초" (예: 11:33) 또는 곡괭이 아이콘(= 지금 채굴 가능)
- 중간: 이름 (예: "2번 채굴장")
- 하단: 좌표 "x, y, z" (예: "-1038, 68, -15")

내용이 있는 카드만 모두 찾아 JSON 배열로만 응답하라.
형식: [{"name":"2번 채굴장","x":-1038,"z":-15,"cooldown_seconds":693}]
곡괭이 아이콘(채굴 가능)이거나 시간이 없으면 cooldown_seconds는 0. 숫자를 정확히 읽어라. 빈 카드는 무시하라.`;

  if (!INSIDE_CLAUDE && !apiKey) {
    scanStatus.textContent = '⚠ AI를 사용하려면 위에 API 키를 먼저 저장하세요.';
    scanStatus.className = 'scan-status error';
    scanRunBtn.disabled = false;
    return;
  }

  try {
    let parsedData = [];

    if (scanEngine === 'gemini') {
      scanStatus.textContent = '⏳ 구글에서 사용 가능한 최신 AI 모델을 찾는 중...';
      const modelsRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
      const modelsData = await modelsRes.json();
      
      if (!modelsRes.ok) throw new Error(`모델 목록을 불러올 수 없습니다: ${modelsData.error?.message}`);

      const candidateModels = modelsData.models
        .filter(m => m.supportedGenerationMethods.includes('generateContent') && (m.name.includes('flash') || m.name.includes('pro')))
        .sort((a, b) => b.name.localeCompare(a.name));

      if (candidateModels.length === 0) throw new Error('이 API 키로 사용할 수 있는 이미지 인식 모델이 없습니다.');

      let data = null, successModel = null, lastError = '';

      for (const model of candidateModels) {
        if (model.name.includes('2.5') && candidateModels.length > 1) continue;
        
        scanStatus.textContent = `⏳ ${model.name.replace('models/', '')} 모델로 스캔 중...`;
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${model.name}:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{
              parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: scanImageData } }]
            }],
            generationConfig: { responseMimeType: "application/json" }
          })
        });

        data = await response.json();
        
        if (response.ok) {
          successModel = model.name;
          break;
        } else {
          lastError = `[${response.status}] ${data.error?.message}`;
        }
      }

      if (!successModel) throw new Error(`모든 모델이 차단되었습니다. 마지막 에러: ${lastError}`);

      let text = data.candidates[0].content.parts[0].text.trim();
      const jsonMatch = text.match(/\[\s*\{[\s\S]*\}\s*\]/);
      if (!jsonMatch) throw new Error('AI 응답에서 데이터 리스트(JSON 배열) 형식을 찾을 수 없습니다.');
      
      parsedData = JSON.parse(jsonMatch[0]);

    } else if (scanEngine === 'ai') {
      const headers = { 
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      };
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST', headers,
        body: JSON.stringify({
          model: 'claude-3-5-sonnet-20240620',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: [{ type: 'image', source: { type: 'base64', media_type: 'image/png', data: scanImageData } }, { type: 'text', text: prompt + " JSON만 출력해." }]
          }]
        })
      });
      if (!response.ok) throw new Error('API 응답 오류 (' + response.status + ')');
      const data = await response.json();
      const text = (data.content || []).map(i => i.type === 'text' ? i.text : '').join('\n');
      const clean = text.replace(/```json|```/g, '').trim();
      const start = clean.indexOf('['), end = clean.lastIndexOf(']');
      parsedData = JSON.parse(clean.slice(start, end + 1));
    }

    scanParsed = parsedData.filter(r =>
      r && typeof r.name === 'string' && Number.isFinite(+r.x) && Number.isFinite(+r.z)
    ).map(r => ({
      name: r.name.trim(),
      x: Math.round(+r.x),
      z: Math.round(+r.z),
      cooldown: Math.max(0, Math.round(+r.cooldown_seconds || 0))
    }));

    if (!scanParsed.length) throw new Error('화면에서 채금장을 찾지 못했습니다.');
    showScanResult();

  } catch (e) {
    scanStatus.textContent = '⚠ 스캔 실패: ' + e.message;
    scanStatus.className = 'scan-status error';
    scanRunBtn.disabled = false;
  }
});

function showScanResult() {
  const rows = scanParsed.map((r, i) => {
    const exists = mines.some(m => m.name === r.name || (m.x === r.x && m.z === r.z));
    const cd = r.cooldown > 0 ? fmtClock(r.cooldown) : '';
    return `<tr>
      <td><input class="cell" data-i="${i}" data-k="name" value="${r.name.replace(/"/g, '&quot;')}"> <span class="${exists ? 'upd-tag' : 'new-tag'}">${exists ? '갱신' : '신규'}</span></td>
      <td style="white-space:nowrap"><input class="cell" data-i="${i}" data-k="x" value="${r.x}" style="width:60px"> <input class="cell" data-i="${i}" data-k="z" value="${r.z}" style="width:60px"></td>
      <td><input class="cell" data-i="${i}" data-k="cd" value="${cd}" placeholder="준비됨" style="width:60px"></td>
    </tr>`;
  }).join('');
  scanResultBox.innerHTML = `<table>
    <thead><tr><th>이름</th><th>좌표 (X, Z)</th><th>쿨타임</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
  scanResultBox.style.display = 'block';
  scanStatus.textContent = `✅ ${scanParsed.length}개 채금장 인식 완료 — 잘못 읽힌 값은 표에서 고친 뒤 적용을 누르세요.`;
  scanStatus.className = 'scan-status';
  scanApplyBtn.style.display = '';
  scanRunBtn.disabled = false;
}

function collectScanEdits() {
  scanResultBox.querySelectorAll('input.cell').forEach(inp => {
    const r = scanParsed[+inp.dataset.i];
    if (!r) return;
    const v = inp.value.trim();
    if (inp.dataset.k === 'name') { if (v) r.name = v; }
    else if (inp.dataset.k === 'x') { const n = parseInt(v, 10); if (!isNaN(n)) r.x = n; }
    else if (inp.dataset.k === 'z') { const n = parseInt(v, 10); if (!isNaN(n)) r.z = n; }
    else if (inp.dataset.k === 'cd') {
      if (!v || v === '준비됨' || v === '0') r.cooldown = 0;
      else { try { r.cooldown = parseCooldown(v.replace(':', ' ')); } catch (e) { /* 유지 */ } }
    }
  });
}

scanApplyBtn.addEventListener('click', () => {
  if (!scanParsed) return;
  collectScanEdits();
  let added = 0, updated = 0;
  for (const r of scanParsed) {
    let m = mines.find(x => x.name === r.name) || mines.find(x => x.x === r.x && x.z === r.z);
    if (m) {
      m.name = r.name; m.x = r.x; m.z = r.z;
      updated++;
    } else {
      m = { id: nextId++, name: r.name, x: r.x, z: r.z, expiry: 0 };
      mines.push(m);
      added++;
    }
    m.expiry = r.cooldown > 0 ? now() + r.cooldown * 1000 : 0;
  }
  route = findOptimalRoute();
  save(); render();
  scanDialog.close();
  toast(`스캔 적용: 신규 ${added}개, 갱신 ${updated}개`);
});

let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

setInterval(() => {
  const active = document.activeElement;
  const typing = active && active.tagName === 'INPUT' && active.closest('.mine-row');
  drawMap(); drawSummary();
  if (!typing) drawList();
}, 1000);

(async () => {
  await loadApiKey();
  const ok = await load();
  if (!ok || (!mines.length && !portals.length)) loadSample();
  render();
})();
</script>
