<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>광산/채집장 쿨타임 관리</title>
<style>
@font-face {
  font-family: 'DungGeunMo';
  src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/DungGeunMo.woff') format('woff');
  font-display: swap;
}
:root {
  --bg: #17191d;
  --panel: #23262c;
  --panel-2: #1c1f24;
  --border: #3a3e46;
  --text: #e8e6df;
  --muted: #9aa0ab;
  --redstone: #ff5544;
  --emerald: #3ddc84;
  --gold: #ffc94d;
  --diamond: #58c4dd;
  --lapis: #6a8cff;
  --amethyst: #b388ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}
header {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  padding: 12px 20px;
  border-bottom: 2px solid var(--border);
  background: var(--panel-2);
}
header h1 { font-size: 20px; color: var(--gold); font-family: 'DungGeunMo', monospace; font-weight: normal; }
header .sub { color: var(--muted); font-size: 12px; }
header .spacer { flex: 1; }

.btn {
  background: var(--panel);
  border: 2px solid var(--border);
  color: var(--text);
  padding: 7px 14px;
  cursor: pointer;
  font-family: 'DungGeunMo', monospace;
  font-size: 13px;
  box-shadow: inset 0 -3px 0 rgba(0,0,0,.35);
  transition: transform .05s ease, border-color .15s;
}
.btn:hover { border-color: var(--gold); }
.btn:active { transform: translateY(2px); box-shadow: none; }
.btn:focus-visible { outline: 2px solid var(--diamond); outline-offset: 2px; }
.btn.primary { background: #2d4a2f; border-color: var(--emerald); color: #d7ffe6; }
.btn.small { padding: 4px 9px; font-size: 12px; }
.btn.danger:hover { border-color: var(--redstone); color: var(--redstone); }

main {
  display: grid;
  grid-template-columns: 1fr 420px;
  gap: 16px;
  padding: 16px 20px;
  max-width: 1600px;
  margin: 0 auto;
}
@media (max-width: 1040px) { main { grid-template-columns: 1fr; } }

.map-panel, .side-panel { background: var(--panel); border: 2px solid var(--border); }
.panel-title {
  font-family: 'DungGeunMo', monospace;
  font-size: 14px; color: var(--diamond);
  padding: 10px 14px;
  border-bottom: 2px solid var(--border);
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.panel-title .hint { margin-left: auto; color: var(--muted); font-size: 11px; font-family: inherit; }

.map-toolbar {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  padding: 8px 14px;
  border-bottom: 1px solid var(--panel-2);
  color: var(--muted); font-size: 12px;
}
.map-toolbar label { display: inline-flex; align-items: center; gap: 5px; cursor: pointer; color: var(--text); }
.map-toolbar input[type=checkbox], .map-toolbar input[type=radio] { accent-color: var(--gold); }
.map-toolbar .zoomctl { margin-left: auto; display: flex; gap: 6px; align-items: center; }

#mapWrap { padding: 10px; }
#mapSvg {
  width: 100%; height: auto; display: block;
  background:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
  background-size: 40px 40px;
  background-color: #14161a;
  border: 2px solid var(--border);
  touch-action: none;
  cursor: grab;
}
#mapSvg.dragging { cursor: grabbing; }

.legend { display: flex; gap: 16px; padding: 8px 14px 12px; color: var(--muted); font-size: 12px; flex-wrap: wrap; }
.legend span { display: inline-flex; align-items: center; gap: 6px; }
.dot { width: 10px; height: 10px; display: inline-block; }
.dot.mine { background: var(--redstone); }
.dot.gather { background: var(--amethyst); border-radius: 2px; }
.dot.ready { background: var(--emerald); }
.dot.portal { background: var(--lapis); border-radius: 50%; }
.dot.route { width: 18px; height: 3px; background: var(--gold); }

.side-panel { display: flex; flex-direction: column; max-height: calc(100vh - 100px); }
@media (max-width: 1040px) { .side-panel { max-height: none; } }

/* 탭 */
.tabs { display: flex; border-bottom: 2px solid var(--border); }
.tab {
  flex: 1; background: var(--panel-2); border: none; border-right: 1px solid var(--border);
  color: var(--muted); padding: 11px 8px; cursor: pointer;
  font-family: 'DungGeunMo', monospace; font-size: 14px;
}
.tab:last-child { border-right: none; }
.tab:hover { color: var(--text); }
.tab.active { background: var(--panel); color: var(--gold); box-shadow: inset 0 -3px 0 var(--gold); }
.tab .count { color: var(--muted); font-size: 12px; }
.tab.active .count { color: var(--diamond); }

.tab-body { display: none; flex-direction: column; flex: 1; min-height: 0; }
.tab-body.active { display: flex; }

.searchbar { padding: 8px 12px; border-bottom: 1px solid var(--panel-2); display: flex; gap: 6px; }
.searchbar input {
  flex: 1; background: var(--panel-2); border: 2px solid var(--border);
  color: var(--text); padding: 6px 9px; font-size: 13px; font-family: inherit;
}
.searchbar input:focus { outline: none; border-color: var(--diamond); }

.rows { overflow-y: auto; flex: 1; min-height: 120px; }
.row-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--panel-2);
}
.row-item:hover { background: #262a31; }
.row-item.hl { background: #2c3340; }
.row-item .main { flex: 1; min-width: 0; }
.row-item .name {
  display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  cursor: pointer;
}
.row-item .name:hover { color: var(--gold); }
.row-item .coord { display: block; color: var(--muted); font-size: 11px; font-family: monospace; }
.row-item .time {
  font-family: 'DungGeunMo', monospace; font-size: 14px;
  min-width: 62px; text-align: right; color: var(--gold);
}
.row-item .time.ready { color: var(--emerald); }
.row-item input.cd {
  width: 72px; background: var(--panel-2); border: 2px solid var(--border);
  color: var(--text); padding: 5px 7px; font-size: 13px; font-family: inherit;
}
.row-item input.cd:focus { outline: none; border-color: var(--diamond); }
.iconbtn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 3px 4px; }
.iconbtn:hover { color: var(--gold); }
.iconbtn.del:hover { color: var(--redstone); }
.empty-msg { padding: 18px 14px; color: var(--muted); font-size: 13px; }

.side-actions { padding: 10px 12px; border-top: 2px solid var(--border); display: flex; flex-wrap: wrap; gap: 8px; }
.side-actions select { flex: 1 1 100%; padding: 7px; text-align: left; font-family: inherit; }

.route-summary { padding: 10px 14px; border-top: 2px solid var(--border); font-size: 13px; max-height: 190px; overflow-y: auto; }
.route-summary ol { padding-left: 20px; display: grid; gap: 5px; }
.route-summary li { cursor: pointer; }
.route-summary li:hover b { color: var(--diamond); }
.route-summary .empty { color: var(--muted); }
.route-summary b { color: var(--gold); font-weight: normal; font-family: 'DungGeunMo', monospace; }

dialog {
  background: var(--panel); color: var(--text);
  border: 2px solid var(--gold); padding: 20px; min-width: 320px;
}
dialog::backdrop { background: rgba(0,0,0,.65); }
dialog h2 { font-family: 'DungGeunMo', monospace; font-size: 15px; color: var(--gold); margin-bottom: 12px; font-weight: normal; }
dialog label { display: block; color: var(--muted); font-size: 12px; margin: 10px 0 4px; }
dialog input, dialog textarea {
  width: 100%; background: var(--panel-2); border: 2px solid var(--border);
  color: var(--text); padding: 7px 9px; font-size: 14px; font-family: inherit;
}
dialog input:focus, dialog textarea:focus { outline: none; border-color: var(--diamond); }
dialog .row { display: flex; gap: 8px; }
dialog .row > div { flex: 1; }
dialog .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
dialog .error { color: var(--redstone); font-size: 12px; margin-top: 6px; min-height: 15px; }
textarea { resize: vertical; min-height: 110px; font-family: monospace !important; }

.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--panel); border: 2px solid var(--emerald);
  padding: 9px 18px; font-family: 'DungGeunMo', monospace; font-size: 13px;
  opacity: 0; pointer-events: none; transition: opacity .25s; z-index: 50;
}
.toast.show { opacity: 1; }

.drop-zone { border: 2px dashed var(--border); padding: 24px 14px; text-align: center; color: var(--muted); cursor: pointer; margin-top: 6px; transition: border-color .15s; }
.drop-zone:hover, .drop-zone.over { border-color: var(--gold); color: var(--text); }
.drop-zone img { max-width: 100%; max-height: 220px; display: block; margin: 0 auto; }
.drop-zone video { display: block; width: 100%; max-height: 220px; object-fit: contain; background: #000; }
.scan-status { font-size: 13px; margin-top: 10px; min-height: 18px; }
.scan-status.working { color: var(--diamond); }
.scan-status.error { color: var(--redstone); }
.engine-row { display: grid; gap: 4px; margin-top: 8px; font-size: 13px; }
.engine-row label { display: flex; align-items: center; gap: 6px; margin: 0; color: var(--text); font-size: 13px; cursor: pointer; }
.engine-row input { accent-color: var(--gold); }
.scan-result { margin-top: 10px; max-height: 220px; overflow-y: auto; border: 2px solid var(--border); display: none; }
.scan-result table { width: 100%; border-collapse: collapse; font-size: 13px; }
.scan-result th, .scan-result td { padding: 5px 8px; text-align: left; border-bottom: 1px solid var(--panel-2); }
.scan-result th { color: var(--muted); font-weight: normal; font-size: 12px; position: sticky; top: 0; background: var(--panel); }
.scan-result input.cell { width: 100%; min-width: 52px; background: var(--panel-2); border: 1px solid var(--border); color: var(--text); padding: 3px 5px; font-size: 13px; }
.scan-result input.cell:focus { outline: none; border-color: var(--diamond); }
.scan-result .new-tag { color: var(--emerald); font-size: 11px; }
.scan-result .upd-tag { color: var(--gold); font-size: 11px; }

svg text { user-select: none; pointer-events: none; }
.marker { cursor: pointer; }
.marker:hover .block { stroke: var(--gold); stroke-width: 2.5; }
.marker.sel .block { stroke: var(--diamond); stroke-width: 3; }
@media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>

<header>
  <h1>⛏ 광산/채집장 관리</h1>
  <span class="sub">이동 속도 15블록/초</span>
  <span class="spacer"></span>
  <button class="btn small primary" id="btnScan">📷 화면 스캔</button>
  <button class="btn small" id="btnImport">CSV 불러오기</button>
  <button class="btn small" id="btnExport">CSV 내보내기</button>
  <button class="btn small danger" id="btnReset">초기화</button>
</header>

<main>
  <section class="map-panel">
    <div class="panel-title">지도 <span class="hint">마커를 클릭하면 수정 · 드래그로 이동 · 휠로 확대</span></div>
    
    <div class="map-toolbar" style="background:var(--panel-2); padding: 6px 14px; gap: 18px; border-bottom: 1px solid var(--border);">
      <strong style="color:var(--text); font-size:12px;">보기 대상:</strong>
      <label><input type="radio" name="targetMode" value="mines"> 광산만</label>
      <label><input type="radio" name="targetMode" value="gathers"> 채집장만</label>
      <label><input type="radio" name="targetMode" value="all" checked> 모두 보기</label>
    </div>

    <div class="map-toolbar">
      <label><input type="checkbox" id="optLabels" checked> 이름 표시</label>
      <label><input type="checkbox" id="optTimes" checked> 쿨타임 표시</label>
      <label><input type="checkbox" id="optRouteLabels"> 경로 라벨</label>
      <label><input type="checkbox" id="optOnlyReady"> 준비됨만 보기</label>
      <span class="zoomctl">
        <button class="btn small" id="btnZoomOut">−</button>
        <span id="zoomLevel" style="min-width:44px;text-align:center;font-family:monospace">100%</span>
        <button class="btn small" id="btnZoomIn">+</button>
        <button class="btn small" id="btnZoomFit">전체 보기</button>
      </span>
    </div>
    <div id="mapWrap"><svg id="mapSvg" viewBox="0 0 900 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="광산과 포탈 지도"></svg></div>
    <div class="legend">
      <span><i class="dot mine"></i> 광산 쿨</span>
      <span><i class="dot gather"></i> 채집장 쿨</span>
      <span><i class="dot ready"></i> 채굴/채집 가능</span>
      <span><i class="dot portal"></i> 포탈</span>
      <span><i class="dot route"></i> 이동 경로</span>
    </div>
  </section>

  <aside class="side-panel">
    <div class="tabs">
      <button class="tab active" data-tab="mines">⛏ 광산 <span class="count" id="mineCount">0</span></button>
      <button class="tab" data-tab="gathers">🌿 채집장 <span class="count" id="gatherCount">0</span></button>
      <button class="tab" data-tab="portals">🌀 포탈 <span class="count" id="portalCount">0</span></button>
    </div>

    <div class="tab-body active" id="tab-mines">
      <div class="searchbar">
        <input id="mineSearch" placeholder="광산 이름·좌표 검색" autocomplete="off">
        <button class="btn small btnSortList" data-target="mines" title="정렬 전환">쿨타임순</button>
      </div>
      <div class="rows" id="mineList"></div>
      <div class="route-summary" id="mineRouteSummary"></div>
      <div class="side-actions">
        <select class="btn routeMode">
          <option value="simple" selected>방식 2: 남은 시간 적은 순</option>
          <option value="optimal">방식 1: 대기시간 최소화 콤보</option>
        </select>
        <button class="btn primary btnRoute" style="flex:1">경로 갱신</button>
        <button class="btn" id="btnAddMine">+ 광산</button>
        <button class="btn danger btnClearCd" data-target="mines">쿨타임 해제</button>
      </div>
    </div>

    <div class="tab-body" id="tab-gathers">
      <div class="searchbar">
        <input id="gatherSearch" placeholder="채집장 이름·좌표 검색" autocomplete="off">
        <button class="btn small btnSortList" data-target="gathers" title="정렬 전환">쿨타임순</button>
      </div>
      <div class="rows" id="gatherList"></div>
      <div class="route-summary" id="gatherRouteSummary"></div>
      <div class="side-actions">
        <select class="btn routeMode">
          <option value="simple" selected>방식 2: 남은 시간 적은 순</option>
          <option value="optimal">방식 1: 대기시간 최소화 콤보</option>
        </select>
        <button class="btn primary btnRoute" style="flex:1">경로 갱신</button>
        <button class="btn" id="btnAddGather">+ 채집장</button>
        <button class="btn danger btnClearCd" data-target="gathers">쿨타임 해제</button>
      </div>
    </div>

    <div class="tab-body" id="tab-portals">
      <div class="searchbar">
        <input id="portalSearch" placeholder="포탈 이름·좌표 검색" autocomplete="off">
      </div>
      <div class="rows" id="portalList"></div>
      <div class="route-summary" id="portalInfo"></div>
      <div class="side-actions">
        <button class="btn primary" id="btnAddPortal" style="flex:1">+ 포탈</button>
      </div>
    </div>
  </aside>
</main>

<dialog id="cdDialog">
  <h2 id="cdTitle">쿨타임 수정</h2>
  <label for="cdInput">쿨타임 (예: 5 30, 5:30, 5분 30초, 5)</label>
  <input id="cdInput" autocomplete="off">
  <div class="error" id="cdError"></div>
  <div class="actions">
    <button class="btn small" id="cdReady" type="button">준비됨으로</button>
    <button class="btn small" id="cdCancel" type="button">취소</button>
    <button class="btn small primary" id="cdOk" type="button">설정</button>
  </div>
</dialog>

<dialog id="editDialog">
  <h2 id="editTitle">추가</h2>
  <label for="editName">이름</label>
  <input id="editName" autocomplete="off">
  <div class="row">
    <div><label for="editX">X 좌표</label><input id="editX" type="number"></div>
    <div><label for="editZ">Z 좌표</label><input id="editZ" type="number"></div>
  </div>
  <div class="error" id="editError"></div>
  <div class="actions">
    <button class="btn small danger" id="editDelete" type="button" style="margin-right:auto;display:none">삭제</button>
    <button class="btn small" id="editCancel" type="button">취소</button>
    <button class="btn small primary" id="editOk" type="button">저장</button>
  </div>
</dialog>

<dialog id="csvDialog">
  <h2>CSV 불러오기</h2>
  <label>형식: <code>type,name,x,z</code> (type은 mine, gather 또는 portal)<br>헤더 없이 <code>name,x,z</code>만 있으면 광산으로 처리됩니다.</label>
  <textarea id="csvText" placeholder="mine,다이아 광산,120,-340&#10;gather,약초 채집장,10,20&#10;portal,중앙 포탈,0,0"></textarea>
  <label style="margin-top:10px">또는 파일 선택 <input type="file" id="csvFile" accept=".csv,.txt" style="border:none;padding:4px 0"></label>
  <div class="error" id="csvError"></div>
  <div class="actions">
    <button class="btn small" id="csvCancel" type="button">취소</button>
    <button class="btn small" id="csvReplace" type="button">교체</button>
    <button class="btn small primary" id="csvAppend" type="button">추가</button>
  </div>
</dialog>

<dialog id="scanDialog" style="min-width:440px;max-width:560px">
  <h2>📷 방송 화면 스캔</h2>
  <label>채금장 목록이 보이는 화면을 캡처하거나 스크린샷을 올리면 이름·좌표·쿨타임을 읽어 자동 등록합니다.</label>
  <div class="engine-row">
    <label><input type="radio" name="scanEngine" value="ocr"> 로컬 OCR — 무료, 화면이 브라우저 밖으로 안 나감</label>
    <label><input type="radio" name="scanEngine" value="gemini"> Gemini AI (추천, 매우 정확함)</label>
    <label><input type="radio" name="scanEngine" value="ai"> Claude AI</label>
  </div>
  <div class="row" style="margin:8px 0">
    <button class="btn small" id="btnCapture" type="button" style="flex:0 0 auto">🖥 화면·창 캡처</button>
    <button class="btn small" id="btnSnap" type="button" style="flex:0 0 auto;display:none">📸 이 장면 스캔</button>
  </div>
  <div class="drop-zone" id="dropZone" tabindex="0">
    클릭해서 이미지 선택 · 드래그 앤 드롭 · Ctrl+V 붙여넣기
  </div>
  <input type="file" id="scanFile" accept="image/*" style="display:none">
  <div id="apiKeyBox" style="display:none;margin-top:10px">
    <label for="apiKeyInput">API 키 (Gemini 또는 Anthropic · 이 브라우저에만 저장됨)</label>
    <div class="row">
      <input id="apiKeyInput" type="password" placeholder="AI API 키 입력..." autocomplete="off">
      <button class="btn small" id="apiKeySave" type="button" style="flex:0 0 auto">키 저장</button>
    </div>
  </div>
  <div class="scan-status" id="scanStatus"></div>
  <div class="scan-result" id="scanResult"></div>
  <div class="actions">
    <button class="btn small" id="scanCancel" type="button">닫기</button>
    <button class="btn small" id="scanRun" type="button" disabled>스캔 시작</button>
    <button class="btn small primary" id="scanApply" type="button" style="display:none">적용</button>
  </div>
</dialog>

<div class="toast" id="toast"></div>

<script>
'use strict';
const SPEED = 15;
const STORE_KEY = 'minemap:data';
const $ = id => document.getElementById(id);

let mines = [], gathers = [], portals = [], route = [], nextId = 1;
let selectedId = null;
let sortModes = { mines: 'cd', gathers: 'cd' }; 
let view = { scale: 1, tx: 0, ty: 0 };
let currentTargetMode = 'all'; 
const VW = 900, VH = 760;

const now = () => Date.now();
const remainSec = m => Math.max(0, Math.ceil((m.expiry - now()) / 1000));
const dist = (a, b) => Math.hypot(a.x - b.x, a.z - b.z);
const fmt = s => `${Math.floor(Math.max(0,Math.round(s))/60)}분 ${Math.max(0,Math.round(s))%60}초`;
const fmtClock = s => { s = Math.max(0, Math.round(s)); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; };

function parseCooldown(str) {
  str = (str || '').trim();
  if (!str) throw new Error('빈 입력');
  let m;
  if ((m = str.match(/^(\d+)\s+(\d+)$/))) return +m[1]*60 + +m[2];
  if ((m = str.match(/^(\d+):(\d+)$/))) return +m[1]*60 + +m[2];
  if (/^\d+$/.test(str)) return +str * 60;
  let mins = 0, secs = 0, ok = false;
  if ((m = str.match(/(\d+)\s*분/))) { mins = +m[1]; ok = true; }
  if ((m = str.match(/(\d+)\s*초/))) { secs = +m[1]; ok = true; }
  if (!ok) throw new Error("형식이 맞지 않습니다. 예: '5 30', '5:30', '5분 30초', '5'");
  return mins*60 + secs;
}

const INSIDE_CLAUDE = typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function';
async function storageSet(k, v) { if (INSIDE_CLAUDE) await window.storage.set(k, v); else localStorage.setItem(k, v); }
async function storageGet(k) {
  if (INSIDE_CLAUDE) { const r = await window.storage.get(k); return r ? r.value : null; }
  return localStorage.getItem(k);
}
async function save() { try { await storageSet(STORE_KEY, JSON.stringify({ mines, gathers, portals, nextId })); } catch (e) {} }
async function load() {
  try {
    const v = await storageGet(STORE_KEY);
    if (v) { const d = JSON.parse(v); mines = d.mines || []; gathers = d.gathers || []; portals = d.portals || []; nextId = d.nextId || 1; return true; }
  } catch (e) {}
  return false;
}

// ---------- 대상 필터링 ----------
function getActiveTargets() {
  let targets = [];
  if (currentTargetMode === 'mines') targets = [...mines];
  else if (currentTargetMode === 'gathers') targets = [...gathers];
  else targets = [...mines, ...gathers]; 
  return targets;

// ---------- 경로 ----------
function nearestPortal(target) {
  let best = null, minT = Infinity;
  for (const p of portals) { const t = dist(p, target) / SPEED; if (t < minT) { minT = t; best = p; } }
  return best ? { portal: best, travel: minT } : null;
}
function findOptimalRoute() {
  const activeTab = document.querySelector('.tab-body.active');
  const modeSelect = activeTab ? activeTab.querySelector('.routeMode') : null;
  const mode = modeSelect ? modeSelect.value : 'simple';
  
  const targets = getActiveTargets();
  const cdMap = new Map(targets.map(m => [m.id, remainSec(m)]));
  const result = [];
  if (!portals.length || !targets.length) return result;

  if (mode === 'simple') {
    const sorted = [...targets].sort((a,b) => {
      const d = cdMap.get(a.id) - cdMap.get(b.id);
      return d !== 0 ? d : a.name.localeCompare(b.name);
    });
    let order = 1;
    for (const target of sorted) {
      const np = nearestPortal(target);
      if (np) result.push({ portalId: np.portal.id, targetId: target.id, order: order++, travel: np.travel });
    }
    return result;
  }

  let t = 0;
  const visited = new Set();
  while (visited.size < targets.length) {
    const cands = [];
    for (const target of targets) {
      if (visited.has(target.id)) continue;
      const np = nearestPortal(target);
      if (!np) continue;
      const wait = Math.max(0, cdMap.get(target.id) - (t + np.travel));
      cands.push({ target, portal: np.portal, travel: np.travel, wait });
    }
    if (!cands.length) break;
    cands.sort((a,b) => a.wait !== b.wait ? a.wait - b.wait : a.travel - b.travel);
    const best = cands[0];
    visited.add(best.target.id);
    result.push({ portalId: best.portal.id, targetId: best.target.id, order: result.length + 1, travel: best.travel });
    t += best.travel + best.wait;
  }
  return result;
}
function runRoute() { route = findOptimalRoute(); render(); }

// ---------- 좌표 변환 ----------
const PAD = 70;
function baseProjector() {
  const all = [...mines, ...gathers, ...portals];
  if (!all.length) return () => [VW/2, VH/2];
  const xs = all.map(l => l.x), zs = all.map(l => l.z);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minZ = Math.min(...zs), maxZ = Math.max(...zs);
  const spanX = Math.max(1, maxX - minX), spanZ = Math.max(1, maxZ - minZ);
  const s = Math.min((VW - PAD*2) / spanX, (VH - PAD*2) / spanZ);
  const ox = (VW - spanX * s) / 2, oy = (VH - spanZ * s) / 2;
  return loc => [(loc.x - minX) * s + ox, (loc.z - minZ) * s + oy];
}
function projector() {
  const base = baseProjector();
  return loc => { const [x,y] = base(loc); return [x * view.scale + view.tx, y * view.scale + view.ty]; };
}

// ---------- 라벨 충돌 회피 ----------
function placeLabels(items) {
  const placed = [];
  const overlap = (a, b) =>
    a.x - a.w/2 < b.x + b.w/2 && a.x + a.w/2 > b.x - b.w/2 &&
    a.y - a.h < b.y && a.y > b.y - b.h;
  const offsets = [0,-16,16,-32,32,-48,48,-64,64,-80,80,-96,96];
  for (const it of items) {
    let done = false;
    for (const dy of offsets) {
      const c = { ...it, y: it.y + dy };
      if (!placed.some(p => overlap(c, p))) { placed.push(c); done = true; break; }
    }
    if (!done) placed.push({ ...it, hidden: true });
  }
  return placed;
}

let panning = null;
svg.addEventListener('pointerdown', e => {
  if (e.target.closest('.marker')) return;
  panning = { x: e.clientX, y: e.clientY, tx: view.tx, ty: view.ty };
  svg.classList.add('dragging');
  svg.setPointerCapture(e.pointerId);
});
svg.addEventListener('pointermove', e => {
  if (!panning) return;
  const rect = svg.getBoundingClientRect();
  const k = VW / rect.width;
  view.tx = panning.tx + (e.clientX - panning.x) * k;
  view.ty = panning.ty + (e.clientY - panning.y) * k;
  drawMap();
});
const endPan = () => { panning = null; svg.classList.remove('dragging'); };
svg.addEventListener('pointerup', endPan);
svg.addEventListener('pointercancel', endPan);
svg.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = svg.getBoundingClientRect();
  const k = VW / rect.width;
  const mx = (e.clientX - rect.left) * k, my = (e.clientY - rect.top) * k;
  zoomAt(mx, my, e.deltaY < 0 ? 1.15 : 1/1.15);
}, { passive: false });

function zoomAt(cx, cy, factor) {
  const ns = Math.min(8, Math.max(0.4, view.scale * factor));
  const f = ns / view.scale;
  view.tx = cx - (cx - view.tx) * f;
  view.ty = cy - (cy - view.ty) * f;
  view.scale = ns;
  drawMap();
}
$('btnZoomIn').addEventListener('click', () => zoomAt(VW/2, VH/2, 1.25));
$('btnZoomOut').addEventListener('click', () => zoomAt(VW/2, VH/2, 1/1.25));
$('btnZoomFit').addEventListener('click', () => { view = { scale: 1, tx: 0, ty: 0 }; drawMap(); });
function focusOn(loc) {
  const base = baseProjector();
  const [bx, by] = base(loc);
  view.scale = Math.max(view.scale, 2.2);
  view.tx = VW/2 - bx * view.scale;
  view.ty = VH/2 - by * view.scale;
  drawMap();
}

['optLabels','optTimes','optRouteLabels','optOnlyReady'].forEach(id => $(id).addEventListener('change', drawMap));

function matches(loc, q) {
  if (!q) return true;
  q = q.toLowerCase();

}

      if (!np) continue;
      if (!grouped.has(np.portal.id)) grouped.set(np.portal.id, []);
      grouped.get(np.portal.id).push({ m, t: np.travel });
    }
    let html = '<div style="color:var(--muted);font-size:12px;margin-bottom:6px">지금 갈 수 있는 목표 (포탈별)</div>';
    for (const [pid, arr2] of grouped) {
      const p = portals.find(x => x.id === pid);
      arr2.sort((a,b) => a.t - b.t);
      html += `<div style="margin-bottom:4px"><b>${p.name}</b> → ` +
        arr2.map(o => `${o.m.name} <span style="color:var(--muted)">${fmtClock(o.t)}</span>`).join(', ') + '</div>';
    }
    box.innerHTML = html;
  }
}

function drawSummary() {
  const drawForTab = (tabPrefix) => {
    const box = $(`${tabPrefix}RouteSummary`);
    if(!box) return;
    const byId = new Map([...mines, ...gathers, ...portals].map(l => [l.id, l]));
    
    if (!route.length) {
      box.innerHTML = portals.length
        ? '<span class="empty">경로 갱신을 누르면 방문 순서와 출발 포탈이 계산됩니다.</span>'
        : '<span class="empty">포탈 탭에서 포탈을 먼저 추가하세요.</span>';
      return;
    }
    const ol = document.createElement('ol');
    for (const s of route.slice(0, 30)) {
      const p = byId.get(s.portalId), m = byId.get(s.targetId);
      if (!p || !m) continue;
      
      const r = remainSec(m);
      const li = document.createElement('li');
      li.innerHTML = `<b>${m.name}</b> · <b>${p.name}</b> 출발 · 쿨 <span style="color:${r===0?'var(--emerald)':'var(--gold)'}">${r===0?'준비됨':fmt(r)}</span> · 이동 ${fmt(s.travel)}`;
      li.addEventListener('click', () => { selectedId = m.id; focusOn(m); render(); });
      ol.appendChild(li);
    }
    box.innerHTML = '';
    box.appendChild(ol);
  };
  
  drawForTab('mine');
  drawForTab('gather');
}

function parseCsv(text) {
  const newMines = [], newGathers = [], newPortals = [];
  for (const line of text.split(/\r?\n/).map(l => l.trim()).filter(Boolean)) {
    const cells = line.split(',').map(c => c.trim());
    const low = cells.map(c => c.toLowerCase());
    if (low.includes('name') && (low.includes('x') || low.includes('z'))) continue;
    let type = 'mine', name, x, z;
    if (cells.length >= 4 && (low[0] === 'mine' || low[0] === 'portal' || low[0] === 'gather')) {
      type = low[0]; name = cells[1]; x = parseInt(cells[2],10); z = parseInt(cells[3],10);
    } else if (cells.length >= 3) {
      name = cells[0]; x = parseInt(cells[1],10); z = parseInt(cells[2],10);
    } else continue;
    
    if (!name || isNaN(x) || isNaN(z)) continue;
    const loc = { id: nextId++, name, x, z, type };
    if (type === 'portal') newPortals.push(loc); 
    else if (type === 'gather') newGathers.push({ ...loc, expiry: 0 });
    else newMines.push({ ...loc, expiry: 0 });
  }
  return { newMines, newGathers, newPortals };
}
function importCsv(replace) {
  const { newMines, newGathers, newPortals } = parseCsv($('csvText').value);
  if (!newMines.length && !newGathers.length && !newPortals.length) { $('csvError').textContent = '읽을 수 있는 데이터가 없습니다.'; return; }
  if (replace) { mines = newMines; gathers = newGathers; portals = newPortals; route = []; }
  else { mines.push(...newMines); gathers.push(...newGathers); portals.push(...newPortals); }
  save(); runRoute();
  csvDialog.close();
  toast(`광산 ${newMines.length}개, 채집장 ${newGathers.length}개, 포탈 ${newPortals.length}개를 불러왔습니다`);
}

let captureStream = null, captureVideo = null;
const btnSnap = $('btnSnap');
function stopCapture() {
  if (captureStream) { captureStream.getTracks().forEach(t => t.stop()); captureStream = null; }
  captureVideo = null;
  btnSnap.style.display = 'none';
}
$('btnCapture').addEventListener('click', async () => {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
    scanStatus.textContent = '⚠ 이 환경에서는 화면 캡처를 쓸 수 없습니다.';
    scanStatus.className = 'scan-status error';
    return;
  }
  try { stopCapture(); captureStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false }); }
  catch (e) { scanStatus.textContent = '화면 선택을 취소했습니다.'; scanStatus.className = 'scan-status'; return; }
  captureVideo = document.createElement('video');
  captureVideo.srcObject = captureStream;
  captureVideo.muted = true;
  await captureVideo.play();
  dropZone.innerHTML = '';
  dropZone.appendChild(captureVideo);
  btnSnap.style.display = '';
  scanStatus.textContent = '화면이 연결됐습니다. 채금장 목록이 보일 때 "📸 이 장면 스캔"을 누르세요.';
  scanStatus.className = 'scan-status';
  captureStream.getVideoTracks()[0].addEventListener('ended', () => {
    stopCapture();
    scanStatus.textContent = '화면 공유가 끝났습니다.';
  });
});
btnSnap.addEventListener('click', () => {
  if (!captureVideo || !captureVideo.videoWidth) return;
  const canvas = document.createElement('canvas');
  const ratio = Math.min(1, 1920 / Math.max(captureVideo.videoWidth, captureVideo.videoHeight));
  canvas.width = Math.round(captureVideo.videoWidth * ratio);
  canvas.height = Math.round(captureVideo.videoHeight * ratio);
  canvas.getContext('2d').drawImage(captureVideo, 0, 0, canvas.width, canvas.height);
  scanImageData = canvas.toDataURL('image/png').split(',')[1];
  scanRunBtn.disabled = false;
  scanRunBtn.click();
});

function loadScanImage(file) {
  const img = new Image();
  img.onload = () => {
    const maxSide = scanEngine === 'ocr' ? 4000 : 1568;
    const ratio = Math.min(1, maxSide / Math.max(img.width, img.height));
    const canvas = document.createElement('canvas');
    canvas.width = Math.round(img.width * ratio);
    canvas.height = Math.round(img.height * ratio);
    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
    const dataUrl = canvas.toDataURL('image/png');
    scanImageData = dataUrl.split(',')[1];
    dropZone.innerHTML = '';
    const preview = new Image();
    preview.src = dataUrl;
    dropZone.appendChild(preview);
    scanRunBtn.disabled = false;
    scanStatus.textContent = '이미지를 준비했습니다 — 스캔 시작을 누르세요.';
    scanStatus.className = 'scan-status';
    URL.revokeObjectURL(img.src);
  };
  img.onerror = () => { scanStatus.textContent = '이미지를 읽을 수 없습니다.'; scanStatus.className = 'scan-status error'; };
  img.src = URL.createObjectURL(file);
}

scanRunBtn.addEventListener('click', async () => {
  if (!scanImageData) return;
  scanRunBtn.disabled = true;
  scanResultBox.style.display = 'none';
  scanApplyBtn.style.display = 'none';

  if (scanEngine === 'ocr') {
    scanStatus.textContent = '⚠ OCR은 광산에 최적화되어 있습니다.';
    scanRunBtn.disabled = false;
    return;
  }

  const prompt = `이 게임 스크린샷에는 채금장(광산/채집장) 카드들이 나열되어 있다.
각 카드에는 다음이 표시된다:
- 상단: 남은 쿨타임 "분:초" (예: 11:33) 또는 아이콘(= 지금 채굴 가능)
- 중간: 이름 (예: "2번 채굴장" 또는 "1번 채집장")
- 하단: 좌표 "x, y, z" (예: "-1038, 68, -15")

내용이 있는 카드만 모두 찾아 JSON 배열로만 응답하라.
형식: [{"name":"2번 채굴장","x":-1038,"z":-15,"cooldown_seconds":693}]
아이콘이거나 시간이 없으면 cooldown_seconds는 0. 숫자를 정확히 읽어라. 빈 카드는 무시하라.`;

  if (!INSIDE_CLAUDE && !apiKey) {
    scanStatus.textContent = '⚠ AI를 쓰려면 위에 API 키를 먼저 저장하세요.';
    scanStatus.className = 'scan-status error';
    scanRunBtn.disabled = false;
    return;
  }

  try {
    let parsedData = [];
    if (scanEngine === 'gemini') {
      scanStatus.textContent = '⏳ Gemini 스캔 중...';
      scanStatus.className = 'scan-status working';
      const modelsRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
      const modelsData = await modelsRes.json();
      const candidates = modelsData.models
        .filter(m => m.supportedGenerationMethods.includes('generateContent') && (m.name.includes('flash') || m.name.includes('pro')))
        .sort((a,b) => b.name.localeCompare(a.name));
      let data = null, ok = false;
      for (const model of candidates) {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/${model.name}:generateContent?key=${apiKey}`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: 'image/png', data: scanImageData } }] }],
            generationConfig: { responseMimeType: 'application/json' }
          })
        });
        data = await res.json();
        if (res.ok) { ok = true; break; }
      }
      if(!ok) throw new Error("스캔 실패");
      const text = data.candidates[0].content.parts[0].text.trim();
      const m = text.match(/\[\s*\{[\s\S]*\}\s*\]/);
      parsedData = JSON.parse(m[0]);

    } else {
      scanStatus.textContent = '⏳ Claude 스캔 중...';
      scanStatus.className = 'scan-status working';
      const headers = { 'Content-Type': 'application/json' };
      if (!INSIDE_CLAUDE) {
        headers['x-api-key'] = apiKey;
        headers['anthropic-version'] = '2023-06-01';
        headers['anthropic-dangerous-direct-browser-access'] = 'true';
      }
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST', headers,
        body: JSON.stringify({
          model: 'claude-sonnet-4-6', max_tokens: 1000,
          messages: [{ role: 'user', content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/png', data: scanImageData } },
            { type: 'text', text: prompt + ' JSON만 출력해.' }
          ]}]
        })
      });
      const data = await res.json();
      const text = (data.content || []).map(i => i.type === 'text' ? i.text : '').join('\n');
      const clean = text.replace(/```json|```/g, '').trim();
      const s = clean.indexOf('['), e2 = clean.lastIndexOf(']');
      parsedData = JSON.parse(clean.slice(s, e2 + 1));
    }

    scanParsed = parsedData
      .filter(r => r && typeof r.name === 'string' && Number.isFinite(+r.x) && Number.isFinite(+r.z))
      .map(r => ({ name: r.name.trim(), x: Math.round(+r.x), z: Math.round(+r.z), cooldown: Math.max(0, Math.round(+r.cooldown_seconds || 0)) }));
    if (!scanParsed.length) throw new Error('채금장을 찾지 못했습니다.');
    showScanResult();
  } catch (e) {
    scanStatus.textContent = '⚠ 스캔 실패: ' + e.message;
    scanStatus.className = 'scan-status error';
    scanRunBtn.disabled = false;
  }
});

function showScanResult() {
  const rows = scanParsed.map((r, i) => {
    let type = r.name.includes('채집') ? 'gather' : 'mine';
    const arr = type === 'gather' ? gathers : mines;
    const exists = arr.some(m => m.name === r.name || (m.x === r.x && m.z === r.z));
    const cd = r.cooldown > 0 ? fmtClock(r.cooldown) : '';
    return `<tr>
      <td><input class="cell" data-i="${i}" data-k="name" value="${r.name.replace(/"/g,'&quot;')}"> <span class="${exists ? 'upd-tag' : 'new-tag'}">${exists ? '갱신' : '신규'}</span></td>
      <td style="white-space:nowrap"><input class="cell" data-i="${i}" data-k="x" value="${r.x}" style="width:60px"> <input class="cell" data-i="${i}" data-k="z" value="${r.z}" style="width:60px"></td>
      <td><input class="cell" data-i="${i}" data-k="cd" value="${cd}" placeholder="준비됨" style="width:60px"></td>
    </tr>`;
  }).join('');
  scanResultBox.innerHTML = `<table><thead><tr><th>이름</th><th>좌표 (X, Z)</th><th>쿨타임</th></tr></thead><tbody>${rows}</tbody></table>`;
  scanResultBox.style.display = 'block';
  scanStatus.textContent = `✅ 대상 ${scanParsed.length}개를 읽었습니다 — 잘못 읽힌 값은 고친 뒤 적용을 누르세요.`;
  scanStatus.className = 'scan-status';
  scanApplyBtn.style.display = '';
  scanRunBtn.disabled = false;
}
function collectScanEdits() {
  scanResultBox.querySelectorAll('input.cell').forEach(inp => {
    const r = scanParsed[+inp.dataset.i];
    if (!r) return;
    const v = inp.value.trim(), k = inp.dataset.k;
    if (k === 'name') { if (v) r.name = v; }
    else if (k === 'x' || k === 'z') { const n = parseInt(v, 10); if (!isNaN(n)) r[k] = n; }
    else if (k === 'cd') {
      if (!v || v === '준비됨' || v === '0') r.cooldown = 0;
      else { try { r.cooldown = parseCooldown(v.replace(':', ' ')); } catch (e) {} }
    }
  });
}
scanApplyBtn.addEventListener('click', () => {
  if (!scanParsed) return;
  collectScanEdits();
  let added = 0, updated = 0;
  for (const r of scanParsed) {
    let type = r.name.includes('채집') ? 'gather' : 'mine';
    let arr = type === 'gather' ? gathers : mines;
    let m = arr.find(x => x.name === r.name) || arr.find(x => x.x === r.x && x.z === r.z);
    
    if (m) { m.name = r.name; m.x = r.x; m.z = r.z; updated++; }
    else { m = { id: nextId++, name: r.name, x: r.x, z: r.z, type, expiry: 0 }; arr.push(m); added++; }
    m.expiry = r.cooldown > 0 ? now() + r.cooldown*1000 : 0;
  }
  save(); runRoute();
  scanDialog.close();
  toast(`스캔 적용: 신규 ${added}개, 갱신 ${updated}개`);
});

let toastTimer;
function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

setInterval(() => {
  const a = document.activeElement;
  const typing = a && a.tagName === 'INPUT';
  drawMap(); drawSummary();
  if (!typing) { drawTargetList('mine'); drawTargetList('gather'); drawPortalList(); }
}, 1000);

(async () => {
  await loadApiKey();
  const ok = await load();
  if (!ok || (!mines.length && !gathers.length && !portals.length)) loadSample();
  runRoute();
})();
</script>
</body>
</html>
